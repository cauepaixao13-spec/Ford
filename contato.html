<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="autor" content="Cauê Paixão">
    <title>Contato - Ford Ranger 2022</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">

    <nav class="home">
        <a href="index.html">
            <img src="Img/Ford logo nova.png" alt="Logo da Ford" width="150">
        </a>
    </nav>

    <nav class="nav">
        <a href="index.html">Home</a> /
        <a href="lancamento.html">Lançamento</a> /
        <a href="contato.html">Contato</a>
    </nav>

</header>

<main class="main">

    <section class="contato-container">

        <div class="carro">
            <img src="Img/xls 2.2 diesel.jpg" alt="Ford Ranger">
        </div>

        <form class="form-contato">

            <h3>Sobre você</h3>

            <input type="text" placeholder="Nome*" required>

            <input type="email" placeholder="E-mail*" required>

            <input type="text" placeholder="CPF*" required>

            <input type="text" placeholder="Sobrenome*" required>

            <input type="tel" placeholder="Telefone*" required>

            <select>
                <option>Como deseja ser contatado</option>
                <option>Email</option>
                <option>Telefone</option>
            </select>

            <textarea placeholder="Mensagem"></textarea>

            <button type="submit">Enviar</button>

        </form>

    </section>

</main>

<footer class="footer">

    <div class="social-links">
        <span class="redes-text">Redes:</span>

        <a href="https://www.facebook.com/ford" target="_blank">
            <img src="Img/facebook-50.png" alt="Facebook" width="30">
        </a>

        <a href="https://www.x.com/ford" target="_blank">
            <img src="Img/X-logo-50.avif" alt="X" width="30">
        </a>

        <a href="https://www.instagram.com/ford" target="_blank">
            <img src="Img/instagram-new.png" alt="Instagram" width="30">
        </a>

        <a href="https://www.youtube.com/ford" target="_blank">
            <img src="Img/youtube-squared-50.png" alt="YouTube" width="30">
        </a>
    </div>

    <section class="copyright">
        <p>&copy; 2022 Ford Motor Company. Todos os direitos reservados.</p>
    </section>

    <img class="ford-logo-footer" src="Img/ford-96.png" alt="Ford">

</footer>
</body>
</html>
