<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="autor" content="Cauê Paixão">
    <title>Lançamento - Ford Ranger 2022</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
        <nav class="home">
            <a href="index.html">
                <img src="Img/Ford logo nova.png" alt="Logo da Ford" width="150">
            </a>
        </nav>
        <nav class="nav">
            <a href="index.html">Home</a> /
            <a href="lancamento.html">Lançamento</a> /
            <a href="contato.html">Contato</a>
        </nav>
    </header>

    <main class="lancamento">

        <div class="iframe-wrapper">
            <iframe
                src="https://www.youtube.com/embed/vQsryuNmsL0?autoplay=1&mute=1&controls=0&loop=1&playlist=vQsryuNmsL0"
                title="YouTube video player"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
            </iframe>
        </div>

        <p class="ford-message">
            Confira o vídeo de lançamento da nova Ford Ranger 2022.
            Para mais detalhes, visite o site oficial da Ford
            <a href="https://www.ford.com.br/picapes/ranger/" target="_blank">aqui!</a>
        </p>

        <div class="ford-car-image">

            <label class="car-card">
                <img src="Img/XL Cabine.jpg" alt="Ford Ranger XL">
                <input type="checkbox">
                <span class="check"></span>
                <p class="modelo">Ranger XL</p>
                <p class="preco">R$ 189.990</p>
            </label>

            <label class="car-card">
                <img src="Img/xls 2.2 diesel.jpg" alt="Ford Ranger XLS">
                <input type="checkbox">
                <span class="check"></span>
                <p class="modelo">Ranger XLS</p>
                <p class="preco">R$ 209.990</p>
            </label>

            <label class="car-card">
                <img src="Img/storm.jpg" alt="Ford Ranger Storm">
                <input type="checkbox">
                <span class="check"></span>
                <p class="modelo">Ranger Storm</p>
                <p class="preco">R$ 229.990</p>
            </label>

        </div>

        <button class="butao">Comparar Carros</button>

    </main>

    <footer class="footer">

        <div class="social-links">
            <span class="redes-text">Redes:</span>

            <a href="https://www.facebook.com/ford" target="_blank">
                <img src="Img/facebook-50.png" alt="Facebook" width="30">
            </a>

            <a href="https://www.x.com/ford" target="_blank">
                <img src="Img/X-logo-50.avif" alt="X" width="30">
            </a>

            <a href="https://www.instagram.com/ford" target="_blank">
                <img src="Img/instagram-new.png" alt="Instagram" width="30">
            </a>

            <a href="https://www.youtube.com/ford" target="_blank">
                <img src="Img/youtube-squared-50.png" alt="YouTube" width="30">
            </a>
        </div>

        <section class="copyright">
            <p>&copy; 2022 Ford Motor Company. Todos os direitos reservados.</p>
        </section>

        <img class="ford-logo-footer" src="Img/ford-96.png" alt="Ford">

    </footer>
</body>
</html>
